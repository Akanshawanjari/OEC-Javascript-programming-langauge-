<!DOCTYPE html>
<html>
<head>
<title>Leave Application Form</title>

<style>
body{
    font-family: Arial;
    margin:40px;
}

h2{
    text-align:center;
}

form{
    width:400px;
    margin:auto;
    border:2px solid black;
    padding:20px;
    border-radius:10px;
}

input,select,textarea{
    width:100%;
    padding:8px;
    margin:6px 0;
}

.error{
    color:red;
}

.success{
    color:green;
}

button{
    background:green;
    color:white;
    padding:10px;
    border:none;
    width:100%;
}
</style>

</head>

<body>

<h2>Leave Application</h2>

<form id="form">

<label>Name</label>
<input type="text" id="name">

<label>Employee ID</label>
<input type="text" id="empid">

<label>Leave Type</label>
<select id="leave">
<option value="">Select</option>
<option>Casual</option>
<option>Sick</option>
<option>Earned</option>
</select>

<label>From Date</label>
<input type="date" id="from">

<label>To Date</label>
<input type="date" id="to">

<label>Total Days</label>
<input type="text" id="days" readonly>

<label>Reason</label>
<textarea id="reason"></textarea>

<p id="msg"></p>

<button type="submit">Submit</button>

</form>

<script>

let fromDate = document.getElementById("from");
let toDate = document.getElementById("to");
let days = document.getElementById("days");
let msg = document.getElementById("msg");
let form = document.getElementById("form");

function countDays(){

if(fromDate.value && toDate.value){

let d1 = new Date(fromDate.value);
let d2 = new Date(toDate.value);

if(d2 >= d1){

let diff = (d2-d1)/(1000*60*60*24)+1;
days.value = diff;
msg.innerHTML="";

}
else{

msg.innerHTML="To Date must be after From Date";
msg.className="error";
days.value="";

}

}

}

fromDate.addEventListener("change",countDays);
toDate.addEventListener("change",countDays);

form.addEventListener("submit",function(e){

e.preventDefault();

let name = document.getElementById("name").value;
let empid = document.getElementById("empid").value;
let leave = document.getElementById("leave").value;
let reason = document.getElementById("reason").value;

let d1 = new Date(fromDate.value);
let d2 = new Date(toDate.value);

if(name==""){
msg.innerHTML="Name is required";
msg.className="error";
return;
}

if(empid==""){
msg.innerHTML="Employee ID is required";
msg.className="error";
return;
}

if(leave==""){
msg.innerHTML="Please select leave type";
msg.className="error";
return;
}

if(!fromDate.value || !toDate.value){
msg.innerHTML="Please select both dates";
msg.className="error";
return;
}

if(d2 < d1){
msg.innerHTML="To Date must be after From Date";
msg.className="error";
return;
}

if(reason==""){
msg.innerHTML="Reason is required";
msg.className="error";
return;
}

msg.innerHTML="Leave Application Submitted Successfully";
msg.className="success";

});

</script>

</body>
</html>
